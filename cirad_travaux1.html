<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIRAD Travaux Manager</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>

  <style>
    :root {
      --cg: #22a126;
      --cp: #dd007e;
      --cy: #acd300
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      overflow-x: hidden
    }

    .lbg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden
    }

    .blob {
      position: absolute;
      filter: blur(100px);
      opacity: 0.09;
      border-radius: 50%;
      animation: mv 35s infinite alternate ease-in-out
    }

    .b1 {
      width: 800px;
      height: 800px;
      background: var(--cg);
      top: -200px;
      left: -200px
    }

    .b2 {
      width: 700px;
      height: 700px;
      background: var(--cp);
      bottom: -100px;
      right: -100px;
      animation-delay: -7s
    }

    .b3 {
      width: 600px;
      height: 600px;
      background: var(--cy);
      top: 30%;
      left: 50%;
      animation-delay: -12s
    }

    @keyframes mv {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(180px, 120px) scale(1.25)
      }
    }

    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(25px) saturate(170%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04)
    }

    .glass-side {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(40px);
      border-right: 1px solid rgba(255, 255, 255, 0.6)
    }

    .tab-act {
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.9);
      color: #1e293b !important
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px
    }

    .fi {
      animation: fadeIn 0.35s ease-out forwards
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    input,
    select,
    textarea {
      outline: none
    }

    .inp {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(226, 232, 240, 0.8);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      transition: border-color .2s
    }

    .inp:focus {
      border-color: #22a126;
      background: white
    }

    .lbl {
      display: block;
      font-size: 9px;
      font-weight: 900;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 5px
    }

    .badge-green {
      background: #f0fdf4;
      color: #22a126;
      border: 1px solid #bbf7d0
    }

    .badge-red {
      background: #fff1f2;
      color: #f43f5e;
      border: 1px solid #fecdd3
    }

    .badge-amber {
      background: #fffbeb;
      color: #d97706;
      border: 1px solid #fde68a
    }

    .badge-blue {
      background: #eff6ff;
      color: #3b82f6;
      border: 1px solid #bfdbfe
    }

    .badge-gray {
      background: #f8fafc;
      color: #64748b;
      border: 1px solid #e2e8f0
    }

    .gantt-row:hover .gantt-label {
      color: #22a126
    }

    /* BOX ERREUR CRITIQUE */
    #error-box {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 9999;
      padding: 40px;
      color: red;
      font-family: monospace;
      white-space: pre-wrap;
      border: 5px solid red;
      overflow: auto;
    }

    @media print {
      .no-print {
        display: none !important
      }

      body {
        background: white !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact
      }

      .lbg {
        display: none !important
      }

      .glass {
        background: white !important;
        box-shadow: none !important;
        border: 1px solid #e2e8f0 !important;
        backdrop-filter: none !important
      }

      .glass-side {
        display: none !important
      }

      main {
        padding: 0 !important
      }

      .print-gantt-area {
        overflow: visible !important;
        max-width: none !important
      }

      .gantt-print-header {
        display: block !important
      }
    }

    .gantt-print-header {
      display: none
    }

    @page {
      size: A3 landscape;
      margin: 15mm
    }

    .app-load-spin {
      animation: app-spin .9s linear infinite
    }

    @keyframes app-spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>
